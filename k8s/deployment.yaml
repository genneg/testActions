apiVersion: apps/v1

kind: Deployment
metadata:
  name: devops-capstone
spec:
  replicas: 
  selector:
    matchLabels:
      app: devops-capstone
  template:
    metadata:
      labels:
        app: devops-capstone
    spec:
      containers:
        - name: devops-capstone
          image: g3nn3g/testactions:latest
          ports:
            - containerPort: 8000
